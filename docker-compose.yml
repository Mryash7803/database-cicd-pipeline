version: "3.8"

services:
  postgres:
    image: postgres:18.4
    container_name: dev-postgres
    environment:
      POSTGRES_USER: devops
      POSTGRESS_PASWORD: devops123
      POSTGRES_DB: appdb

    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
